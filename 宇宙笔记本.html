<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>宇宙笔记 - 倾听星云的回响</title>
    <style>
        :root {
            --bg-color: #030305;
            --text-color: rgba(255, 255, 255, 0.8);
            --accent-color: #a29bfe;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: "SimSun", "STSong", "Songti SC", serif;
        }

        #canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* --- 初始引导遮罩样式 --- */
        #start-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #030305; z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; transition: opacity 3s ease;
        }

        .guide-text {
            text-align: center; line-height: 3.5; letter-spacing: 6px;
            opacity: 0; transform: translateY(20px);
            transition: all 2.5s ease;
            margin: 5px 0;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .guide-text.show { opacity: 1; transform: translateY(0); }

        .enter-hint { 
            margin-top: 60px; font-size: 0.85rem; opacity: 0; 
            transition: opacity 3s ease; letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.4);
        }
        .enter-hint.show { opacity: 1; }

        /* --- UI 容器 --- */
        .ui-container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; pointer-events: none;
        }

        #editor {
            width: 65%; height: 45%; background: transparent; border: none; outline: none;
            color: var(--text-color); font-size: 1.2rem; line-height: 2.2;
            resize: none; pointer-events: auto;
            text-shadow: 0 0 8px rgba(255,255,255,0.2);
            transition: opacity 2s ease, transform 2s ease;
            z-index: 11; font-family: inherit;
        }

        #history-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 70%; background: rgba(10, 10, 15, 0.98);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100; display: none; padding: 40px; color: white;
            overflow-y: auto; border-radius: 8px;
        }

        .history-item { border-bottom: 1px dashed rgba(255, 255, 255, 0.1); padding: 20px 0; }
        .history-date { font-size: 0.8rem; opacity: 0.4; margin-bottom: 5px; }

        .controls, .music-player {
            position: fixed; z-index: 20; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px; border-radius: 4px; color: white; display: flex;
            flex-direction: column; gap: 8px; pointer-events: auto;
        }

        .music-player { top: 20px; left: 20px; width: 220px; }
        .controls { bottom: 30px; right: 30px; flex-direction: row; }

        button {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 6px 12px; cursor: pointer; font-family: inherit; transition: 0.3s;
        }
        button:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

<div id="start-mask" onclick="startUniverse()">
    <div class="guide-text" id="guide-1">万物皆为星尘，你我亦然。</div>
    <div class="guide-text" id="guide-2">在这里，每一个文字都会化作星辰，</div>
    <div class="guide-text" id="guide-3">去往那永恒的寂静深处。</div>
    <div class="enter-hint" id="guide-hint">「 点击屏幕 开启宇宙 」</div>
</div>

<canvas id="canvas"></canvas>

<div id="history-panel">
    <button onclick="toggleHistory()">关闭</button>
    <h2 style="font-weight: normal; letter-spacing: 5px;">往昔心语</h2>
    <div id="history-content"></div>
</div>

<div class="music-player">
    <div style="font-size: 0.85rem; opacity: 0.8;">曲目：肖邦 - 小夜曲</div>
    <div style="display:flex; gap:10px; align-items:center;">
        <button id="play-btn" onclick="toggleMusic()">▶ 播放</button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="updateVolume()">
    </div>
</div>

<div class="ui-container">
    <textarea id="editor" placeholder="在这里，向宇宙诉说你的愿望..."></textarea>
</div>

<div class="controls">
    <button onclick="toggleHistory()">查看往昔</button>
    <button onclick="saveAsImage()">保存图片</button>
    <button onclick="submitToUniverse()">投递至宇宙</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const editor = document.getElementById('editor');
    const audio = new Audio('https://videotourl.com/audio/1776422961894-ba93225c-9cec-42ea-9514-8ef0827e3e7d.mp3');
    audio.loop = true;

    let particles = [];
    let backgroundStars = [];
    let meteors = [];
    let nebulaCenter = { x: 0, y: 0 };
    let nebulaHue = Math.random() * 360;
    let isSubmitting = false;

    // 指引显示逻辑
    window.onload = () => {
        setTimeout(() => document.getElementById('guide-1').classList.add('show'), 1000);
        setTimeout(() => document.getElementById('guide-2').classList.add('show'), 3200);
        setTimeout(() => document.getElementById('guide-3').classList.add('show'), 5400);
        setTimeout(() => document.getElementById('guide-hint').classList.add('show'), 8000); 
    };

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        nebulaCenter = { x: canvas.width / 2, y: canvas.height / 2 };
        backgroundStars = [];
        for (let i = 0; i < 220; i++) {
            backgroundStars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.3,
                twinkle: Math.random() * Math.PI * 2,
                speed: 0.01 + Math.random() * 0.02
            });
        }
    }

    function startUniverse() {
        const mask = document.getElementById('start-mask');
        mask.style.opacity = '0';
        setTimeout(() => { mask.style.display = 'none'; }, 3000);
        init();
        animate();
        audio.play().catch(() => console.log("等待交互播放音频"));
    }

    // --- 极低频率流星类 ---
    class Meteor {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width * 1.2;
            this.y = -100; 
            this.length = Math.random() * 120 + 80;
            this.speed = Math.random() * 4 + 3; // 速度进一步放慢，更优雅
            this.opacity = 1;
            this.width = Math.random() * 1.2 + 0.4;
        }
        draw() {
            ctx.save();
            ctx.beginPath();
            let gradient = ctx.createLinearGradient(this.x, this.y, this.x + this.length, this.y - this.length);
            gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity * 0.5})`);
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.strokeStyle = gradient;
            ctx.lineWidth = this.width;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + this.length, this.y - this.length);
            ctx.stroke();
            ctx.restore();
        }
        update() {
            this.x -= this.speed;
            this.y += this.speed;
            this.opacity -= 0.003; 
        }
    }

    class Particle {
        constructor(x, y, hue) {
            this.baseRadius = Math.hypot(x - nebulaCenter.x, y - nebulaCenter.y);
            this.angle = Math.atan2(y - nebulaCenter.y, x - nebulaCenter.x);
            this.size = Math.random() * 1.8 + 0.5;
            this.hue = hue + (Math.random() - 0.5) * 40;
            this.sat = 75; this.light = 75;
            this.alpha = Math.random() * 0.5 + 0.4;
            this.rotationSpeed = (Math.random() * 0.001 + 0.0003) * (Math.random() > 0.5 ? 1 : -1);
            this.breathPhase = Math.random() * Math.PI * 2;
            this.spiralOutSpeed = 0;
        }
        update() {
            if (isSubmitting) {
                this.rotationSpeed *= 1.025;
                this.angle += this.rotationSpeed;
                this.spiralOutSpeed += 0.25; 
                this.baseRadius += this.spiralOutSpeed;
                this.light = Math.min(this.light + 2, 98);
                this.sat = Math.min(this.sat + 2, 100);
                this.alpha -= 0.008;
                this.x = nebulaCenter.x + Math.cos(this.angle) * this.baseRadius;
                this.y = nebulaCenter.y + Math.sin(this.angle) * this.baseRadius;
            } else {
                this.angle += this.rotationSpeed;
                this.breathPhase += 0.02;
                const r = this.baseRadius * (1 + Math.sin(this.breathPhase) * 0.05);
                this.x = nebulaCenter.x + Math.cos(this.angle) * r;
                this.y = nebulaCenter.y + Math.sin(this.angle) * r;
            }
        }
        draw() {
            if (this.alpha <= 0) return;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            if (isSubmitting) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsla(${this.hue}, ${this.sat}%, ${this.light}%, ${this.alpha})`;
            }
            ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.light}%, ${this.alpha})`;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    editor.addEventListener('input', () => {
        if (isSubmitting) return;
        const targetCount = editor.value.length * 8;
        if (particles.length < targetCount) {
            const needed = targetCount - particles.length;
            for (let i = 0; i < needed; i++) {
                const angle = (particles.length + i) * 137.5 * (Math.PI / 180);
                const r = Math.sqrt(particles.length + i) * 14;
                particles.push(new Particle(nebulaCenter.x + Math.cos(angle) * r, nebulaCenter.y + Math.sin(angle) * r, nebulaHue));
            }
        } else { particles.splice(targetCount); }
    });

    function submitToUniverse() {
        const text = editor.value.trim();
        if (!text || isSubmitting) return;
        const history = JSON.parse(localStorage.getItem('cosmos_history') || '[]');
        history.unshift({ date: new Date().toLocaleString(), content: text });
        localStorage.setItem('cosmos_history', JSON.stringify(history));
        isSubmitting = true;
        editor.style.opacity = 0;
        editor.style.transform = "translateY(-30px)";
    }

    function toggleMusic() {
        if (audio.paused) { audio.play(); document.getElementById('play-btn').innerText = "⏸ 暂停"; }
        else { audio.pause(); document.getElementById('play-btn').innerText = "▶ 播放"; }
    }

    function toggleHistory() {
        const panel = document.getElementById('history-panel');
        if (panel.style.display === 'block') panel.style.display = 'none';
        else {
            const history = JSON.parse(localStorage.getItem('cosmos_history') || '[]');
            const content = document.getElementById('history-content');
            content.innerHTML = history.length ? '' : '<p style="opacity:0.4; text-align:center;">暂无往昔心语</p>';
            history.forEach(item => {
                content.innerHTML += `<div class="history-item"><div class="history-date">${item.date}</div><div>${item.content}</div></div>`;
            });
            panel.style.display = 'block';
        }
    }

    function animate() {
        ctx.fillStyle = 'rgba(3, 3, 5, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        backgroundStars.forEach(s => {
            s.twinkle += s.speed;
            ctx.fillStyle = `rgba(255, 255, 255, ${0.15 + (Math.sin(s.twinkle) + 1) * 0.35})`;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
        });

        // 修改流星生成频率为极低: 0.0015
        if (Math.random() < 0.0015) meteors.push(new Meteor()); 
        meteors.forEach((m, index) => {
            m.update(); m.draw();
            if (m.opacity <= 0 || m.x < -200 || m.y > canvas.height + 200) meteors.splice(index, 1);
        });

        ctx.globalCompositeOperation = 'lighter';
        particles.forEach((p, index) => {
            p.update(); p.draw();
            if (isSubmitting && p.alpha <= 0) particles.splice(index, 1);
        });
        ctx.globalCompositeOperation = 'source-over';

        if (isSubmitting && particles.length === 0) {
            isSubmitting = false;
            editor.value = ""; editor.style.opacity = 1;
            editor.style.transform = "translateY(0)";
            nebulaHue = Math.random() * 360;
        }
        requestAnimationFrame(animate);
    }

    window.onresize = init;
    function saveAsImage() {
        html2canvas(document.body).then(c => {
            const link = document.createElement('a');
            link.download = `宇宙笔记_${Date.now()}.png`;
            link.href = c.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
